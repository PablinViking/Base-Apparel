<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">
  <title>Frontend Mentor | Base Apparel coming soon page</title>
</head>
<body>

  <header>
    <img class="header_img" src="images/logo.svg" alt="logo">
  </header>

  <div class="heroImage"></div>

  <main>
    <h1>WE'RE <span>COMING SOON</span></h1>
    <p class="textHero">
      Hello fellow shoppers! We're currently building our new fashion store.
      Add your email below to stay up-to-date with announcements and our launch deals.
    </p>

    <form action="#">
      <input type="email" name="emailInput" id="emailInput" placeholder="Email Address">
      <img src="images/icon-error.svg" id="iconError" class="iconError" alt="icon error">
      <input type="submit" value="" id="inputSubmit"><img class="iconArrow" id="iconArrow" src="images/icon-arrow.svg" alt="flechita wachin">
    </form>
    <p id="messError" class="messError">Please provide a valid email</p>

  </main>
  
  
  <footer>
    <p class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
      Coded by <a target="_blank" href="https://github.com/PablinViking">Pablo Boichenko</a>.
    </p>
  </footer>

  <script src="main.js"></script>
</body>
</html>
